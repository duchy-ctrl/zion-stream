name: Build Windows exe

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instaleaza dependentele
        run: pip install pyinstaller flask requests yt-dlp

      - name: Descarca ffmpeg (pentru conversie in MP3)
        shell: pwsh
        run: |
          curl -L -o ffmpeg.zip https://github.com/GyanD/codexffmpeg/releases/download/7.1/ffmpeg-7.1-essentials_build.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_tmp -Force
          Copy-Item (Get-ChildItem -Recurse -Filter ffmpeg.exe ffmpeg_tmp | Select-Object -First 1).FullName -Destination ffmpeg.exe

      - name: Build exe (PyInstaller, un singur fisier, cu ffmpeg inclus)
        run: pyinstaller --onefile --name ZionStream --add-data "zion-stream.html;." --add-binary "ffmpeg.exe;." zion-server.py

      - name: Publica release cu exe-ul
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/ZionStream.exe
          generate_release_notes: true
